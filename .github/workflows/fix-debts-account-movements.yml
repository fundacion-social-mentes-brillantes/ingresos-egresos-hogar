name: Fix Debts Account Movements

on:
  push:
    branches: [main]
    paths: [.github/workflows/fix-debts-account-movements.yml]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Patch debt account movements
        run: |
          python - <<'PY'
          from pathlib import Path

          # 1) Firestore helpers: debt creation/payment must move an account and create a linked transaction.
          p = Path('src/lib/firestore.ts')
          s = p.read_text(encoding='utf-8')

          if 'interface DebtAccountMovementOptions' not in s:
            insert_after = "export async function addDebt(uid: string, data: Omit<Debt, 'id' | 'createdAt' | 'updatedAt'>) {\n  const amountOriginal = Number(data.amountOriginal || 0);\n  const amountPaid = Number(data.amountPaid || 0);\n  return addDoc(debtCol(uid), cleanUndefinedFields({\n    ...data,\n    amountOriginal,\n    amountPaid,\n    currency: data.currency || 'COP',\n    status: data.status || (amountPaid >= amountOriginal ? 'paid' : amountPaid > 0 ? 'partial' : 'open'),\n    dueDate: data.dueDate ? Timestamp.fromDate(data.dueDate) : null,\n    closedAt: data.closedAt ? Timestamp.fromDate(data.closedAt) : null,\n    createdAt: serverTimestamp(),\n    updatedAt: serverTimestamp(),\n  }));\n}\n"
            helper = r'''

interface DebtAccountMovementOptions {
  accountId: string;
  accountName: string;
  date?: Date;
  rawText?: string;
  source?: 'bot' | 'manual';
  confidence?: number;
}

function requireDebtAccount(options: DebtAccountMovementOptions) {
  if (!options?.accountId || !options?.accountName) {
    throw new Error('Elige la cuenta para mover la plata de esta deuda.');
  }
}

export async function addDebtWithAccountMovement(
  uid: string,
  data: Omit<Debt, 'id' | 'createdAt' | 'updatedAt'>,
  options: DebtAccountMovementOptions
) {
  requireDebtAccount(options);
  const amountOriginal = Number(data.amountOriginal || 0);
  const amountPaid = Number(data.amountPaid || 0);
  if (!amountOriginal || amountOriginal <= 0) throw new Error('El valor de la deuda debe ser mayor que cero.');

  const batch = writeBatch(db);
  const newDebtRef = doc(debtCol(uid));
  const newTxRef = doc(txCol(uid));
  const date = options.date || new Date();
  const status = data.status || (amountPaid >= amountOriginal ? 'paid' : amountPaid > 0 ? 'partial' : 'open');
  const isReceivable = data.direction === 'receivable';
  const txType = isReceivable ? 'expense' : 'income';
  const balanceChange = isReceivable ? -amountOriginal : amountOriginal;
  const category = isReceivable ? 'Prestamo entregado' : 'Prestamo recibido';
  const description = data.description || (isReceivable ? `Prestamo a ${data.personName}` : `Prestamo de ${data.personName}`);

  batch.set(newDebtRef, cleanUndefinedFields({
    ...data,
    amountOriginal,
    amountPaid,
    currency: data.currency || 'COP',
    status,
    dueDate: data.dueDate ? Timestamp.fromDate(data.dueDate) : null,
    closedAt: data.closedAt ? Timestamp.fromDate(data.closedAt) : null,
    linkedAccountId: options.accountId,
    linkedAccountName: options.accountName,
    createdAt: serverTimestamp(),
    updatedAt: serverTimestamp(),
  }));

  batch.set(newTxRef, cleanUndefinedFields({
    type: txType,
    amount: amountOriginal,
    currency: 'COP' as const,
    category,
    accountId: options.accountId,
    accountName: options.accountName,
    description,
    date: Timestamp.fromDate(date),
    rawText: options.rawText || description,
    source: options.source || data.source || 'manual',
    confidence: options.confidence ?? data.confidence ?? 1,
    debtId: newDebtRef.id,
    debtMovementKind: isReceivable ? 'loan_principal_out' : 'loan_principal_in',
    excludeFromReports: true,
    createdAt: serverTimestamp(),
    updatedAt: serverTimestamp(),
  }));

  batch.update(accRef(uid, options.accountId), cleanUndefinedFields({
    currentBalance: increment(balanceChange),
    updatedAt: serverTimestamp(),
  }));

  await batch.commit();
  return newDebtRef;
}
'''
            s = s.replace(insert_after, insert_after + helper)

          if 'export async function registerDebtPaymentWithAccount' not in s:
            insert_after = "export async function registerDebtPayment(uid: string, id: string, amount: number) {\n  const current = await getDoc(debtRef(uid, id));\n  if (!current.exists()) return;\n\n  const debt = normalizeDebt(current.id, current.data());\n  const newPaid = Math.min(debt.amountOriginal, debt.amountPaid + Number(amount || 0));\n  const newStatus = newPaid >= debt.amountOriginal ? 'paid' : newPaid > 0 ? 'partial' : 'open';\n  return updateDebt(uid, id, {\n    amountPaid: newPaid,\n    status: newStatus,\n    closedAt: newStatus === 'paid' ? new Date() : null,\n  });\n}\n"
            helper = r'''

export async function registerDebtPaymentWithAccount(
  uid: string,
  id: string,
  amount: number,
  options: DebtAccountMovementOptions
) {
  requireDebtAccount(options);
  const current = await getDoc(debtRef(uid, id));
  if (!current.exists()) throw new Error('No encontre la deuda para registrar el abono.');

  const debt = normalizeDebt(current.id, current.data());
  const remaining = Math.max(0, debt.amountOriginal - debt.amountPaid);
  const appliedAmount = Math.min(remaining, Number(amount || 0));
  if (!appliedAmount || appliedAmount <= 0) throw new Error('El abono debe ser mayor que cero.');

  const isReceivable = debt.direction === 'receivable';
  const txType = isReceivable ? 'income' : 'expense';
  const balanceChange = isReceivable ? appliedAmount : -appliedAmount;
  const newPaid = Math.min(debt.amountOriginal, debt.amountPaid + appliedAmount);
  const newStatus = newPaid >= debt.amountOriginal ? 'paid' : newPaid > 0 ? 'partial' : 'open';
  const date = options.date || new Date();
  const description = isReceivable
    ? `Abono recibido de ${debt.personName}: ${debt.description}`
    : `Pago de deuda a ${debt.personName}: ${debt.description}`;

  const batch = writeBatch(db);
  const paymentTxRef = doc(txCol(uid));

  batch.update(debtRef(uid, id), cleanUndefinedFields({
    amountPaid: newPaid,
    status: newStatus,
    closedAt: newStatus === 'paid' ? new Date() : null,
    lastPaymentAccountId: options.accountId,
    lastPaymentAccountName: options.accountName,
    updatedAt: serverTimestamp(),
  }));

  batch.set(paymentTxRef, cleanUndefinedFields({
    type: txType,
    amount: appliedAmount,
    currency: 'COP' as const,
    category: isReceivable ? 'Pago deuda recibida' : 'Pago deuda pagada',
    accountId: options.accountId,
    accountName: options.accountName,
    description,
    date: Timestamp.fromDate(date),
    rawText: options.rawText || description,
    source: options.source || 'manual',
    confidence: options.confidence ?? 1,
    debtId: id,
    debtMovementKind: isReceivable ? 'debt_payment_in' : 'debt_payment_out',
    excludeFromReports: true,
    createdAt: serverTimestamp(),
    updatedAt: serverTimestamp(),
  }));

  batch.update(accRef(uid, options.accountId), cleanUndefinedFields({
    currentBalance: increment(balanceChange),
    updatedAt: serverTimestamp(),
  }));

  await batch.commit();
  return paymentTxRef;
}

export async function closeDebtWithAccount(uid: string, id: string, options: DebtAccountMovementOptions) {
  const current = await getDoc(debtRef(uid, id));
  if (!current.exists()) throw new Error('No encontre la deuda para cerrarla.');
  const debt = normalizeDebt(current.id, current.data());
  const remaining = Math.max(0, debt.amountOriginal - debt.amountPaid);
  if (remaining <= 0) return updateDebt(uid, id, { status: 'paid', closedAt: new Date() });
  return registerDebtPaymentWithAccount(uid, id, remaining, options);
}
'''
