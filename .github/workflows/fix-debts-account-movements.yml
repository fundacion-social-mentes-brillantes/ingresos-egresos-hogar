            helper = r'''

function resolveAccountMentionForDebt(accounts: Account[], message: string, preferredName?: string | null): Account | null {
  const preferred = normalizeText(preferredName || '');
  if (preferred) {
    const exact = accounts.find((account) => normalizeText(account.name) === preferred);
    if (exact) return exact;
  }
  const text = normalizeText(message).replace(/\s+/g, ' ');
  const exactInText = accounts
    .filter((account) => text.includes(normalizeText(account.name)))
    .sort((a, b) => normalizeText(b.name).length - normalizeText(a.name).length);
  if (exactInText.length) return exactInText[0];
  const alias = [
    { words: ['nequi'], type: 'nequi', name: 'nequi' },
    { words: ['daviplata', 'davi plata'], type: 'daviplata', name: 'daviplata' },
    { words: ['efectivo'], type: 'cash', name: 'efectivo' },
    { words: ['banco'], type: 'bank', name: 'banco' },
  ].find((item) => item.words.some((word) => text.includes(word)));
  if (alias) {
    return accounts.find((account) => account.type === alias.type || normalizeText(account.name) === alias.name) || null;
  }
  return accounts.length === 1 ? accounts[0] : null;
}
