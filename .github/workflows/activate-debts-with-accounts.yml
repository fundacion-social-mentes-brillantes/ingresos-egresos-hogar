name: Activate Debts With Accounts

on:
  push:
    branches: [main]
    paths: [.github/workflows/activate-debts-with-accounts.yml]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Activate page
        run: |
          cat > src/pages/DebtsPage.tsx <<'EOF'
          export { DebtsPageWithAccounts as DebtsPage } from './DebtsPageWithAccounts';
          EOF
      - name: Build
        run: |
          npm install
          npm run build
      - name: Commit
        run: |
          git config user.name "fundacionsocial-debug"
          git config user.email "fundacionsocial@gimnasioemocionalmb.com"
          git add src/pages/DebtsPage.tsx
          git commit -m "Activar deudas con selector de cuenta" || exit 0
          git push
