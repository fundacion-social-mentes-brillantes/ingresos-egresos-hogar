name: Fix Chat Delete Layout

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/fix-chat-delete-layout.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Apply chat delete and layout fixes
        run: |
          python - <<'PY'
          from pathlib import Path

          chat_path = Path('src/pages/ChatPage.tsx')
          chat = chat_path.read_text()

          chat = chat.replace(
              "import { addAccount, addChatMessage, addTransaction, getAccounts, getTransactionsByRange } from '../lib/firestore';",
              "import { addAccount, addChatMessage, addTransaction, deleteTransaction, getAccounts, getTransactions, getTransactionsByRange } from '../lib/firestore';"
          )

          if "deleteTarget?:" not in chat:
              chat = chat.replace(
                  "  suggestedNextQuestion?: string;\n}",
                  "  suggestedNextQuestion?: string;\n  deleteTarget?: {\n    scope?: 'last' | 'last_income' | 'last_expense' | 'amount_match';\n    type?: TransactionType | null;\n    amount?: number | string | null;\n    descriptionHint?: string;\n  };\n}",
                  1
              )

          marker = """function buildVercelContext(accounts: Account[], summary: FinancialSummary): string {
  return [
    `Cuentas: ${accounts.map((account) => `${account.name} (${formatCOP(account.currentBalance || 0)})`).join(', ')}`,
    `Resumen del mes: ingresos ${formatCOP(summary.totalIncome)}, gastos ${formatCOP(summary.totalExpenses)}, balance ${formatCOP(summary.balance)}`,
  ].join('\\n');
}
"""
          helpers = marker + r'''
function looksLikeDeleteRequest(message: string): boolean {
  const text = normalizeText(message);
  return ['borra', 'borrar', 'elimina', 'eliminar', 'quita', 'quitar', 'deshaz', 'deshacer', 'anula', 'anular'].some((word) => text.includes(word));
}

async function findTransactionToDelete(uid: string, botAction: VercelBotAction, message: string) {
  const transactions = await getTransactions(uid, 50);
  if (transactions.length === 0) return null;

  const target = botAction.deleteTarget || {};
  const amountFromMessage = normalizeAmount(message);
  const requestedAmount = target.amount ? botAmountToNumber(target.amount) : amountFromMessage;
  const requestedType = target.type || inferTransactionType(message);
  const scope = target.scope || (requestedType === 'income' ? 'last_income' : requestedType === 'expense' ? 'last_expense' : 'last');

  if (scope === 'last_income') return transactions.find((tx) => tx.type === 'income') || null;
  if (scope === 'last_expense') return transactions.find((tx) => tx.type === 'expense') || null;

  if (scope === 'amount_match' || requestedAmount > 0) {
    return transactions.find((tx) => {
      const sameAmount = Math.abs(Number(tx.amount || 0) - requestedAmount) < 1;
      const sameType = requestedType ? tx.type === requestedType : true;
      return sameAmount && sameType;
    }) || null;
  }

  return transactions[0] || null;
}
'''
          if "function looksLikeDeleteRequest" not in chat:
              if marker not in chat:
                  raise SystemExit('buildVercelContext marker not found')
              chat = chat.replace(marker, helpers)

          old = """  if (botAction.intent === 'query_summary') {
    summary = await getLocalMonthlySummary(uid);
    replyToUser = `Te leo los datos reales: este mes llevas ${formatCOP(summary.totalIncome)} en ingresos y ${formatCOP(summary.totalExpenses)} en gastos. Tu balance neto va en ${formatCOP(summary.balance)}. ${summary.balance >= 0 ? 'Vas con margen; la jugada inteligente es separar ahorro antes de seguir gastando.' : 'Estás en negativo; la prioridad es cortar fugas pequeñas y revisar gastos variables hoy mismo.'}`;
  }

  await addChatMessage(uid, {
"""
          new = """  if (botAction.intent === 'delete_transaction' || looksLikeDeleteRequest(message)) {
    const txToDelete = await findTransactionToDelete(uid, botAction, message);

    if (!txToDelete) {
      replyToUser = 'No encontré un movimiento reciente para borrar. Dime el valor exacto o ve a Movimientos y lo eliminas con el ícono de basura.';
      transactionId = undefined;
    } else {
      await deleteTransaction(uid, txToDelete.id);
      summary = await getLocalMonthlySummary(uid);
      const label = txToDelete.type === 'income' ? 'ingreso' : 'gasto';
      replyToUser = `Listo, borré el ${label} de ${formatCOP(txToDelete.amount)} (${txToDelete.description}). El dashboard ya debe actualizarse con el nuevo balance.`;
      transactionId = undefined;
    }
  }

  if (botAction.intent === 'query_summary') {
    summary = await getLocalMonthlySummary(uid);
    replyToUser = `Te leo los datos reales: este mes llevas ${formatCOP(summary.totalIncome)} en ingresos y ${formatCOP(summary.totalExpenses)} en gastos. Tu balance neto va en ${formatCOP(summary.balance)}. ${summary.balance >= 0 ? 'Vas con margen; la jugada inteligente es separar ahorro antes de seguir gastando.' : 'Estás en negativo; la prioridad es cortar fugas pequeñas y revisar gastos variables hoy mismo.'}`;
  }

  await addChatMessage(uid, {
"""
          if "findTransactionToDelete(uid, botAction, message)" not in chat:
              if old not in chat:
                  raise SystemExit('query summary block not found')
              chat = chat.replace(old, new)

          chat = chat.replace("max-w-4xl mx-auto", "max-w-5xl mx-auto")
          chat = chat.replace("h-full bg-slate-900/40", "h-full min-h-0 bg-slate-900/40")
          chat = chat.replace('className="flex-1 overflow-y-auto p-4 space-y-4 custom-scrollbar"', 'className="flex-1 min-h-0 overflow-y-auto p-3 sm:p-5 space-y-4 custom-scrollbar"')
          chat = chat.replace('className="max-w-[85%] px-4 py-2.5 rounded-2xl text-sm shadow-sm', 'className="max-w-[92%] sm:max-w-[85%] px-4 py-2.5 rounded-2xl text-sm shadow-sm')
          chat = chat.replace('className="w-full max-w-[85%] mt-2 space-y-2"', 'className="w-full max-w-[92%] sm:max-w-[85%] mt-2 space-y-2"')
          chat = chat.replace('className="p-4 border-t border-slate-700/50 bg-slate-800/30"', 'className="p-3 sm:p-4 border-t border-slate-700/50 bg-slate-800/30"')
          chat = chat.replace('className="w-12 h-12 bg-slate-800 hover:bg-slate-700', 'className="w-11 h-11 sm:w-12 sm:h-12 bg-slate-800 hover:bg-slate-700')
          chat = chat.replace('className="w-12 h-12 bg-gradient-to-tr', 'className="w-11 h-11 sm:w-12 sm:h-12 bg-gradient-to-tr')
          chat_path.write_text(chat)

          dash_path = Path('src/pages/DashboardPage.tsx')
          dash = dash_path.read_text()
          dash = dash.replace('className="grid grid-cols-1 lg:grid-cols-12 gap-6 pb-8"', 'className="grid grid-cols-1 xl:grid-cols-12 gap-4 xl:gap-6 pb-8 min-h-[calc(100vh-6rem)]"')
          dash = dash.replace('className="lg:col-span-7 xl:col-span-8 flex flex-col h-[600px] lg:h-[calc(100vh-8rem)]"', 'className="xl:col-span-8 2xl:col-span-9 flex flex-col h-[calc(100vh-7rem)] min-h-[640px]"')
          dash = dash.replace('className="lg:col-span-5 xl:col-span-4 space-y-6 overflow-y-auto lg:h-[calc(100vh-8rem)] pr-1 custom-scrollbar"', 'className="xl:col-span-4 2xl:col-span-3 space-y-4 xl:space-y-6 overflow-y-auto xl:h-[calc(100vh-8rem)] pr-1 custom-scrollbar"')
          dash_path.write_text(dash)
          PY
      - name: Commit patch
        run: |
          git config user.name "fundacionsocial-debug"
          git config user.email "fundacionsocial@gimnasioemocionalmb.com"
          git add src/pages/ChatPage.tsx src/pages/DashboardPage.tsx
          git commit -m "Fix chat deletion layout and realtime dashboard" || exit 0
          git push
